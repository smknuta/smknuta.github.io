<html>
 <head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Nunito', sans-serif;
        }
        .hover-bg-blue:hover {
            background-color: #3b82f6; /* Tailwind blue-500 */
        }
        .hover-bg-orange:hover {
            background-color: #f97316; /* Tailwind orange-500 */
        }
        .hover-bg-red:hover {
            background-color: #ef4444; /* Tailwind red-500 */
        }
        .hover-bg-green:hover {
            background-color: #10b981; /* Tailwind green-500 */
        }
        .hover-bg-purple:hover {
            background-color: #8b5cf6; /* Tailwind purple-500 */
        }
        .hover-bg-teal:hover {
            background-color: #14b8a6; /* Tailwind teal-500 */
        }
        .hover-bg-yellow:hover {
            background-color: #facc15; /* Tailwind yellow-500 */
        }
        .hover-text-white:hover {
            color: #ffffff;
        }
        .cursor-pointer {
            cursor: pointer;
        }
  </style>
  <script>
    function openLink(url) {
      window.open(url, "_blank");
    }

    // Fungsi untuk Surat Keputusan
    function showPasswordModal() {
      document.getElementById('passwordModal').classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
      document.getElementById('errorText').classList.add('hidden');
    }

    function hidePasswordModal() {
      document.getElementById('passwordModal').classList.add('hidden');
    }

    function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      if (password === 'guru') {
        window.open('https://kursmknu.netlify.app/sk-guru-pusat/', '_blank');
        hidePasswordModal();
      } else {
        document.getElementById('errorText').classList.remove('hidden');
      }
    }

    // Fungsi untuk Aplikasi Kurikulum
    function showAppPasswordModal() {
      document.getElementById('appPasswordModal').classList.remove('hidden');
      document.getElementById('appPasswordInput').value = '';
      document.getElementById('appErrorText').classList.add('hidden');
    }

    function hideAppPasswordModal() {
      document.getElementById('appPasswordModal').classList.add('hidden');
    }

    function checkAppPassword() {
      const password = document.getElementById('appPasswordInput').value;
      if (password === 'guru') {
        window.open('https://kurikulum-ta.free.nf/', '_blank');
        hideAppPasswordModal();
      } else {
        document.getElementById('appErrorText').classList.remove('hidden');
      }
    }

    // Fungsi untuk App Data Murid
    function showDataMuridPasswordModal() {
      document.getElementById('dataMuridPasswordModal').classList.remove('hidden');
      document.getElementById('dataMuridPasswordInput').value = '';
      document.getElementById('dataMuridErrorText').classList.add('hidden');
    }

    function hideDataMuridPasswordModal() {
      document.getElementById('dataMuridPasswordModal').classList.add('hidden');
    }

    function checkDataMuridPassword() {
      const password = document.getElementById('dataMuridPasswordInput').value;
      if (password === 'guru') {
        window.open('https://script.google.com/a/~/macros/s/AKfycbzTkNZXl2H4Tkc28cm7rR1n-o9HPUCcBaW7HGwws9kqqNqJNTgWqLKBD3fsowUZfMtG/exec', '_blank');
        hideDataMuridPasswordModal();
      } else {
        document.getElementById('dataMuridErrorText').classList.remove('hidden');
      }
    }
  </script>
 </head>
 <body class="bg-white">
  <div class="bg-green-700 text-white py-4">
   <div class="container mx-auto px-4 text-center">
    <h1 class="text-2xl font-bold">
     Selamat Datang di Website Kurikulum
    </h1>
    <p class="text-lg">
     Portal Informasi seputar kurikulum di SMK NU Tulungagung
    </p>
   </div>
  </div>
  
  <main class="container mx-auto px-4 py-8">
   <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    
    <!-- 1. Perpustakaan Digital -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover-bg-blue hover-text-white cursor-pointer" onclick="openLink('https://sites.google.com/view/library-smknu/')">
     <div class="flex-shrink-0">
      <div class="bg-blue-500 text-white p-4 rounded-full">
       <i class="fas fa-laptop"></i>
      </div>
     </div>
     <div class="ml-4">
      <h3 class="text-xl font-bold text-gray-900 hover-text-white">Perpustakaan Digital</h3>
      <p class="text-gray-600 hover-text-white">Literasi-Baca Online</p>
     </div>
    </button>

    <!-- 2. Jadwal -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover-bg-orange hover-text-white cursor-pointer" onclick="openLink('https://sites.google.com/view/kursmknu/')">
     <div class="flex-shrink-0">
      <div class="bg-orange-500 text-white p-4 rounded-full">
       <i class="fas fa-calendar-alt"></i>
      </div>
     </div>
     <div class="ml-4">
      <h3 class="text-xl font-bold text-gray-900 hover-text-white">Jadwal</h3>
      <p class="text-gray-600 hover-text-white">Jadwal Pelajaran, Piket</p>
     </div>
    </button>

    <!-- 3. Program Kokurikuler -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover-bg-green hover-text-white cursor-pointer" onclick="openLink('https://kursmknu.netlify.app/kokurikuler/')">
     <div class="flex-shrink-0">
      <div class="bg-green-500 text-white p-4 rounded-full">
       <i class="fas fa-chalkboard-teacher"></i>
      </div>
     </div>
     <div class="ml-4">
      <h3 class="text-xl font-bold text-gray-900 hover-text-white">Program Kokurikuler</h3>
      <p class="text-gray-600 hover-text-white">Perencanaan, Panduan, Informasi Kegiatan Kokurikuler</p>
     </div>
    </button>
    
    <!-- 4. Surat Keputusan -->
    <button onclick="showPasswordModal()" class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover:bg-red-500 hover:text-white cursor-pointer">
      <div class="flex-shrink-0">
        <div class="bg-red-500 text-white p-4 rounded-full">
          <i class="fas fa-file-alt"></i>
        </div>
      </div>
      <div class="ml-4">
        <h3 class="text-xl font-bold text-gray-900 hover:text-white">Surat Keputusan</h3>
        <p class="text-gray-600 hover:text-white">GTK, Kegiatan</p>
      </div>
    </button>

    <!-- 5. Rujukan Kurikulum Merdeka -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover-bg-purple hover-text-white cursor-pointer" onclick="openLink('https://kurikulum.kemdikbud.go.id/rujukan')">
     <div class="flex-shrink-0">
      <div class="bg-purple-500 text-white p-4 rounded-full">
       <i class="fas fa-list-alt"></i>
      </div>
     </div>
     <div class="ml-4">
      <h3 class="text-xl font-bold text-gray-900 hover-text-white">Rujukan Kurikulum Merdeka</h3>
      <p class="text-gray-600 hover-text-white">Informasi dan Referensi</p>
     </div>
    </button>
    
    <!-- 6. PSAJ -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover-bg-teal hover-text-white cursor-pointer" onclick="var p = prompt('Masukkan password:'); if(p === 'guru'){ window.open('https://kursmknu.netlify.app/sos-psaj/', '_blank'); } else { alert('Password salah!'); }">
        <div class="flex-shrink-0">
            <div class="bg-teal-500 text-white p-4 rounded-full">
                <i class="fas fa-chart-line"></i>
            </div>
        </div>
        <div class="ml-4">
            <h3 class="text-xl font-bold text-gray-900 hover-text-white">PSAJ</h3>
            <p class="text-gray-600 hover-text-white">Perangkat Soal PSAJ</p>
        </div>
    </button>
    
    <!-- 7. Guru Wali -->
    <button class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover:bg-yellow-500 hover:text-white cursor-pointer" onclick="openLink('https://kursmknu.netlify.app/guru-wali/')">
     <div class="flex-shrink-0">
      <div class="bg-yellow-500 text-white p-4 rounded-full">
       <i class="fas fa-user-tie"></i>
      </div>
     </div>
     <div class="ml-4">
      <h3 class="text-xl font-bold text-gray-900 hover:text-white">Guru Wali</h3>
      <p class="text-gray-600 hover:text-white">Informasi Guru Wali</p>
     </div>
    </button>
    
    <!-- 8. Aplikasi Kurikulum -->
    <button onclick="showAppPasswordModal()" class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover:bg-indigo-500 hover:text-white cursor-pointer">
      <div class="flex-shrink-0">
        <div class="bg-indigo-500 text-white p-4 rounded-full">
          <i class="fas fa-book"></i>
        </div>
      </div>
      <div class="ml-4">
        <h3 class="text-xl font-bold text-gray-900 hover:text-white">Aplikasi Kurikulum</h3>
        <p class="text-gray-600 hover:text-white">Manajemen Kurikulum Sekolah</p>
      </div>
    </button>

    <!-- 9. App Data Murid (BARU) -->
    <button onclick="showDataMuridPasswordModal()" class="flex items-center bg-gray-100 p-6 rounded-lg shadow-md hover:bg-pink-500 hover:text-white cursor-pointer">
      <div class="flex-shrink-0">
        <div class="bg-pink-500 text-white p-4 rounded-full">
          <i class="fas fa-user-graduate"></i>
        </div>
      </div>
      <div class="ml-4">
        <h3 class="text-xl font-bold text-gray-900 hover:text-white">App Data Murid</h3>
        <p class="text-gray-600 hover:text-white">Manajemen dan Informasi Data Peserta Didik</p>
      </div>
    </button>

   </div>
   
   <div class="mt-8">
    <h2 class="text-2xl font-bold text-center mb-4">
     Tahun Pelajaran 2026/2027
    </h2>
    <div class="flex justify-center">
     <img alt="gambar pemetaan jurusan." class="rounded-lg shadow-md max-w-full h-auto" src="https://raw.githubusercontent.com/smknuta/smknuta.github.io/refs/heads/main/gambar/jurusan2.jpg"/>
    </div>
   </div>
  </main>

  <!-- Modal untuk Surat Keputusan -->
  <div id="passwordModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md mx-4">
      <h2 class="text-xl font-bold mb-4">Masukkan Password</h2>
      <input type="password" id="passwordInput" class="border border-gray-300 p-2 w-full mb-4 rounded" placeholder="Password...">
      <div class="text-right">
        <button onclick="checkPassword()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mr-2">Submit</button>
        <button onclick="hidePasswordModal()" class="bg-gray-300 hover:bg-gray-400 text-black px-4 py-2 rounded">Batal</button>
      </div>
      <p id="errorText" class="text-red-500 mt-2 hidden">Password salah!</p>
    </div>
  </div>

  <!-- Modal untuk Aplikasi Kurikulum -->
  <div id="appPasswordModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md mx-4">
      <h2 class="text-xl font-bold mb-4">Masukkan Password untuk Aplikasi Kurikulum</h2>
      <input type="password" id="appPasswordInput" class="border border-gray-300 p-2 w-full mb-4 rounded" placeholder="Password...">
      <div class="text-right">
        <button onclick="checkAppPassword()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mr-2">Submit</button>
        <button onclick="hideAppPasswordModal()" class="bg-gray-300 hover:bg-gray-400 text-black px-4 py-2 rounded">Batal</button>
      </div>
      <p id="appErrorText" class="text-red-500 mt-2 hidden">Password salah!</p>
    </div>
  </div>

  <!-- Modal untuk App Data Murid (BARU) -->
  <div id="dataMuridPasswordModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md mx-4">
      <h2 class="text-xl font-bold mb-4">Masukkan Password untuk App Data Murid</h2>
      <input type="password" id="dataMuridPasswordInput" class="border border-gray-300 p-2 w-full mb-4 rounded" placeholder="Password...">
      <div class="text-right">
        <button onclick="checkDataMuridPassword()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded mr-2">Submit</button>
        <button onclick="hideDataMuridPasswordModal()" class="bg-gray-300 hover:bg-gray-400 text-black px-4 py-2 rounded">Batal</button>
      </div>
      <p id="dataMuridErrorText" class="text-red-500 mt-2 hidden">Password salah!</p>
    </div>
  </div>

 </body>
</html>
